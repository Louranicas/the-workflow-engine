# CI for workflow-trace (M0 / v0.1.0 — Plan v2 §15 D29) — GitLab mirror.
#
# Runs the canonical 4-stage quality gate on every push to `main` and on every MR.
#
# **Known M0 limitation:** the `spacetimedb-sdk = { path = "../spacetimedb/sdks/rust" }`
# dependency in `Cargo.toml` references a sibling-of-this-repo directory. When checking
# out this repo standalone (i.e. without the parent habitat workspace), `../spacetimedb`
# does not exist and the build fails. Resolutions on the v0.2.0 roadmap:
# (a) vendor `spacetimedb-sdk` into this repo, OR
# (b) make `spacetimedb` a git submodule, OR
# (c) consume the published `spacetimedb-sdk` from crates.io.
# Until one of those lands, this CI pipeline ships but its "spacetimedb path resolves"
# precondition is owned by the operator. Documented here, not silenced.

image: rust:latest

variables:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

stages:
  - gate

gate:
  stage: gate
  before_script:
    - rustup component add clippy
  script:
    - cargo check --all-targets --all-features
    - cargo clippy --all-targets --all-features -- -D warnings
    - cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic
    - cargo test --all-targets --all-features --release
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
