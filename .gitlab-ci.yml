# CI for workflow-trace (M0 / v0.1.0 — Plan v2 §15 D29) — GitLab mirror.
#
# Runs the canonical 4-stage quality gate on every push to `main` and on every MR.
#
# ## Known M0 limitation — `spacetimedb-sdk` sibling-path dep
#
# See `.github/workflows/ci.yml` for the full recipe (Options A/B/C). The same
# resolutions apply here; GitLab's submodule support matches GitHub's
# `submodules: recursive`. Pinned upstream:
# https://github.com/clockworklabs/SpacetimeDB.git @ fbec2761abbf65b90673130835c4cab6c016924c.

image: rust:latest

variables:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  GIT_SUBMODULE_STRATEGY: recursive   # honours .gitmodules (Option A in ci.yml)

stages:
  - gate

gate:
  stage: gate
  before_script:
    - rustup component add clippy
  script:
    - cargo check --all-targets --all-features
    - cargo clippy --all-targets --all-features -- -D warnings
    - cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic
    - cargo test --all-targets --all-features --release
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
