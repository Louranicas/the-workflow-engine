# CI for workflow-trace (M0 / v0.1.0 — Plan v2 §15 D29).
#
# Runs the canonical 4-stage quality gate on every push to `main` and on every PR.
# Uses NO user-controlled inputs in run: commands — all cargo invocations are static
# strings, no ${{ github.event.* }} expansion (per
# https://github.blog/security/vulnerability-research/how-to-catch-github-actions-workflow-injections-before-attackers-do/).
#
# Known M0 limitation: the `spacetimedb-sdk = { path = "../spacetimedb/sdks/rust" }`
# dependency in `Cargo.toml` references a sibling-of-this-repo directory. When
# checking out this repo standalone (without the parent habitat workspace),
# `../spacetimedb` does not exist and the build fails. Resolutions on the v0.2.0
# roadmap: vendor spacetimedb-sdk OR make spacetimedb a submodule OR consume the
# published crates.io spacetimedb-sdk. Until one of those lands, this CI pipeline
# ships but its "spacetimedb path resolves" precondition is owned by the operator.

name: workflow-trace 4-stage gate

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Stage 1 — cargo check
        run: cargo check --all-targets --all-features

      - name: Stage 2 — cargo clippy (D warnings)
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Stage 3 — cargo clippy (D pedantic)
        run: cargo clippy --all-targets --all-features -- -D warnings -W clippy::pedantic

      - name: Stage 4 — cargo test (release, all targets, all features)
        run: cargo test --all-targets --all-features --release
