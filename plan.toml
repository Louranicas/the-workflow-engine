[[modules]] layer="L1"  name="m2_stcortex_consumer"         description="stcortex narrowed consumer; reducer-callback dedup"                test_kind="async"    depends_on=[]                      loc_estimate=80
[[modules]] layer="L1"  name="m3_injection_db_consumer"     description="injection.db causal_chain reader; resolved/unresolved partition"   test_kind="unit"     depends_on=[]                      loc_estimate=70

# Cluster B — L2
[[modules]] layer="L2"  name="m4_cascade_correlator"        description="Opaque FNV-1a XOR cluster IDs; pairwise correlator"                test_kind="property" depends_on=["m1_atuin_consumer"]              loc_estimate=160
[[modules]] layer="L2"  name="m5_battern_step_record"       description="Battern step recorder; unlabelled batterns preserved"              test_kind="unit"     depends_on=["m1_atuin_consumer"]              loc_estimate=130
[[modules]] layer="L2"  name="m6_context_cost"              description="20-session EMA context cost; excludes Converged outcomes"          test_kind="unit"     depends_on=["m1_atuin_consumer"]              loc_estimate=170

# Cluster C — L3
[[modules]] layer="L3"  name="m7_workflow_runs"             description="Central hub; JSONB consumer_inputs; F9 zero-weight"                test_kind="integration" depends_on=["m4_cascade_correlator","m6_context_cost","m3_injection_db_consumer"]   loc_estimate=140
[[modules]] layer="L3"  name="m12_cli_reports"              description="CLI report emitter; api feature"                                   test_kind="unit"     depends_on=["m7_workflow_runs"]                loc_estimate=110
